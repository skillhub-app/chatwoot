version: '3'

# Local Mac development overrides — merged automatically with docker-compose.yaml
# Start everything: docker compose up
# Build images first time: docker compose up --build

services:
  rails:
    ports:
      - '3000:3000'
    environment:
      - VITE_DEV_SERVER_HOST=vite
      - NODE_ENV=development
      - RAILS_ENV=development
    volumes:
      - ./:/app:cached
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle

  sidekiq:
    volumes:
      - ./:/app:cached
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle

  vite:
    ports:
      - '3036:3036'
    volumes:
      - ./:/app:cached
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle

  postgres:
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PASSWORD=

  redis:
    environment:
      - REDIS_PASSWORD=

  mailhog:
    ports:
      - '1025:1025'
      - '8025:8025'   # UI: http://localhost:8025
