name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            REPO=/opt/volps/chatwoot/repo
            STACK_DIR=/opt/volps/chatwoot

            echo "=== Pulling latest code ==="
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main

            echo "=== Building Docker image ==="
            docker build -f docker/Dockerfile -t volps/chatwoot:latest .

            echo "=== Running migrations ==="
            RAILS_ID=$(docker ps --filter name=chatwoot_rails --format "{{.ID}}" | head -1)
            if [ -n "$RAILS_ID" ]; then
              docker exec "$RAILS_ID" bundle exec rails db:migrate
            fi

            echo "=== Deploying stack ==="
            docker stack deploy -c "$STACK_DIR/stack.yml" chatwoot --with-registry-auth

            echo "=== Waiting for rails to restart ==="
            sleep 20

            echo "=== Running migrations on new container ==="
            for i in $(seq 1 6); do
              RAILS_ID=$(docker ps --filter name=chatwoot_rails --format "{{.ID}}" | head -1)
              if [ -n "$RAILS_ID" ]; then
                docker exec "$RAILS_ID" bundle exec rails db:migrate && break
              fi
              echo "Waiting for container... (${i}/6)"
              sleep 10
            done

            echo "=== Cleaning old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
