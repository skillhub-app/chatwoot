name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e

            # Clone repo if not exists
            if [ ! -d /opt/chatwoot ]; then
              git clone https://github.com/skillhub-app/chatwoot.git /opt/chatwoot
            fi

            cd /opt/chatwoot

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Building Docker image..."
            docker build -f docker/dockerfiles/rails.Dockerfile -t volps/chatwoot:latest .

            echo "Running database migrations..."
            cd /opt/volps
            docker compose run --rm rails bundle exec rails db:migrate

            echo "Restarting services..."
            docker compose up -d --remove-orphans rails sidekiq

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deploy complete."
